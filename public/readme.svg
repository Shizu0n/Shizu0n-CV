<svg width="600" height="760" viewBox="0 0 600 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Paulo Shizuo profile banner</title>
  <desc id="desc">Vertical GitHub profile banner with dark and light mode support.</desc>

  <style>
    :root {
      --bg: #0d1117;
      --panel: #0d1117;
      --border: #30363d;
      --text: #f0f6fc;
      --muted: #7d8590;
      --subtle: #21262d;
      --glow: #161b22;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #ffffff;
        --panel: #ffffff;
        --border: #d0d7de;
        --text: #1f2328;
        --muted: #656d76;
        --subtle: #eaeef2;
        --glow: #f6f8fa;
      }
    }

    .bg { fill: var(--bg); }
    .panel { fill: var(--panel); stroke: var(--border); }
    .line { stroke: var(--subtle); }
    .eyebrow,
    .meta,
    .footer {
      fill: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      text-transform: uppercase;
      letter-spacing: 2.6px;
    }
    .eyebrow { font-size: 12px; }
    .name {
      fill: var(--text);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 58px;
      letter-spacing: -1.8px;
    }
    .role {
      fill: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 22px;
      font-weight: 500;
    }
    .summary {
      fill: var(--muted);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 17px;
    }
    .meta,
    .footer { font-size: 11px; }
  </style>

  <defs>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(300 350) rotate(90) scale(220 180)">
      <stop stop-color="var(--glow)"/>
      <stop offset="1" stop-color="var(--bg)" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect class="bg" width="600" height="760"/>
  <rect width="600" height="760" fill="url(#glow)"/>

  <rect class="panel" x="24" y="24" width="552" height="712" rx="12" stroke-width="1"/>

  <path class="line" d="M92 128H232" stroke-width="1"/>
  <path class="line" d="M368 128H508" stroke-width="1"/>
  <path class="line" d="M92 600H232" stroke-width="1"/>
  <path class="line" d="M368 600H508" stroke-width="1"/>

  <text class="eyebrow" x="300" y="118" text-anchor="middle">Profile</text>

  <g transform="translate(300 302)">
    <rect x="-126" y="-126" width="252" height="252" stroke="var(--subtle)" stroke-width="1" transform="rotate(-4)"/>
    <rect x="-94" y="-94" width="188" height="188" stroke="var(--subtle)" stroke-width="1" transform="rotate(-2)"/>
    <rect x="-68" y="-68" width="136" height="136" stroke="var(--subtle)" stroke-width="1"/>
    <text class="eyebrow" x="0" y="-18" text-anchor="middle">Shizu0n</text>
    <text class="name" x="0" y="50" text-anchor="middle">Paulo Shizuo</text>
  </g>

  <text class="role" x="300" y="552" text-anchor="middle">Full Stack Developer  /  CS Student</text>

  <text class="meta" x="300" y="624" text-anchor="middle">Brazil  /  UNIFOR</text>
  <text class="meta" x="300" y="650" text-anchor="middle">github.com/Shizu0n</text>
</svg>
